description: Huntertales is a fully on-chain idle RPG set in a fantasy world where players explore and reclaim a dangerous continent. Players establish settlements, recruit hunters, and deploy them on automated quests to battle creatures and gather resources. The game emphasizes collaborative gameplay and community coordination to influence territory control and achieve shared goals.
