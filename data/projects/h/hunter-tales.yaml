description: Huntertales is a fully on-chain idle RPG set in the fantasy world of Sylvaris. Players explore a fallen kingdom, recruit hunters, and deploy them on quests to battle creatures and gather resources. The game emphasizes cooperative gameplay and aims for a sustainable token economy.
