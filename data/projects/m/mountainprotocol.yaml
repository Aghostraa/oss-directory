name: mountainprotocol
display_name: Mountain Protocol
description: Mountain Protocol is the issuer of USDM, a regulated, yield-bearing
  stablecoin backed by US Treasuries. It operates on the Ethereum blockchain and
  aims to provide access to the "risk-free rate" with permissionless
  composability and regulatory compliance. The protocol emphasizes transparency
  and security in its operations.
